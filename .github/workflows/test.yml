name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum
            extensions/xconfig/go.sum
            extensions/xgrpc/go.sum
            extensions/xlog/go.sum
            extensions/xopenapi/go.sum
            extensions/xvalidator/go.sum

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run go vet
        run: make go-vet

      - name: Run govulncheck
        run: make go-vuln

  test-root:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum

      - name: Build root module
        run: go build ./...

      - name: Test root module
        run: go test -race -count=1 ./...

  test-extensions:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - extensions/xconfig
          - extensions/xgrpc
          - extensions/xlog
          - extensions/xopenapi
          - extensions/xvalidator

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Build ${{ matrix.module }}
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Test ${{ matrix.module }}
        run: go test -race -count=1 ./...
        working-directory: ${{ matrix.module }}

  test-extensions-examples:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module:
          - extensions/xconfig/examples/kern-integration
          - extensions/xgrpc/examples/kern-integration
          - extensions/xlog/examples/kern-integration
          - extensions/xopenapi/examples/kern-integration
          - extensions/xvalidator/examples/kern-integration

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Build ${{ matrix.module }}
        run: go build ./...
        working-directory: ${{ matrix.module }}

  benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum

      - name: Benchmark smoke test
        run: make ci-benchmark-smoke


