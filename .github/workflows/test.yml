name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.2
          args: --timeout=5m ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run go vet
        run: make go-vet

      - name: Run govulncheck
        run: make go-vuln

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -v ./...

  docs:
    runs-on: ubuntu-latest

    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org

    defaults:
      run:
        working-directory: docs

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install docs dependencies
        run: make ci-docs

  benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache-dependency-path: |
            go.sum
            benchmarks/fourway/go.sum

      - name: Benchmark smoke test
        run: make ci-benchmark-smoke
