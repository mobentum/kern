<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">kern cosmic energy horizontal logo</title>
  <desc id="desc">Cosmic energy orb with radiating pulses and glowing cyan core alongside kern wordmark.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="60%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#2E1065" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(160 160)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="120" fill="url(#glow)" opacity="0.4"/>
    <!-- Energy rings -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#A78BFA" stroke-width="6" opacity="0.7"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#6366F1" stroke-width="4" opacity="0.5"/>
    <!-- Core orb -->
    <circle cx="0" cy="0" r="50" fill="url(#core)"/>
    <!-- Core highlight -->
    <circle cx="-12" cy="-18" r="18" fill="#67E8F9" opacity="0.8"/>
    <!-- Radiating beams -->
    <line x1="0" y1="-105" x2="0" y2="-65" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="65" x2="0" y2="105" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="-105" y1="0" x2="-65" y2="0" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <line x1="65" y1="0" x2="105" y2="0" stroke="#22D3EE" stroke-width="8" stroke-linecap="round"/>
    <!-- Diagonals -->
    <line x1="-75" y1="-75" x2="-48" y2="-48" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    <line x1="48" y1="48" x2="75" y2="75" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    <line x1="75" y1="-75" x2="48" y2="-48" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    <line x1="-48" y1="48" x2="-75" y2="75" stroke="#A78BFA" stroke-width="6" stroke-linecap="round"/>
    <!-- Orbit particles -->
    <circle cx="0" cy="-115" r="7" fill="#67E8F9"/>
    <circle cx="82" cy="-82" r="6" fill="#C084FC"/>
    <circle cx="115" cy="15" r="5" fill="#818CF8"/>
    <circle cx="75" cy="90" r="6" fill="#A78BFA"/>
    <circle cx="-75" cy="90" r="6" fill="#A78BFA"/>
    <circle cx="-115" cy="15" r="5" fill="#818CF8"/>
    <circle cx="-82" cy="-82" r="6" fill="#C084FC"/>
    <circle cx="42" cy="-108" r="5" fill="#67E8F9"/>
  </g>
  <text x="340" y="197" fill="#1E293B" font-size="152" font-weight="700" font-family="Space Grotesk, Manrope, 'Plus Jakarta Sans', Sora, ui-sans-serif, system-ui, sans-serif" letter-spacing="0.5">kern</text>
</svg>
